# QuestLine Agent DM — Configuration

# Signal bot settings
bot_number: "+1XXXXXXXXXX"          # Your Signal bot's phone number
signal_rpc_url: "http://127.0.0.1:8080/api/v1/rpc"
signal_tcp_host: "localhost"
signal_tcp_port: 7583

# Directories
campaigns_dir: "campaigns"
data_dir: "data"

# Allowed groups (only these Signal groups can interact with the bot)
# Find your group ID in the bot's logs when someone messages the group.
allowed_groups:
  - "YOUR_GROUP_ID_HERE"

# LLM provider: "anthropic" or "gemini"
# API key from .env file (ANTHROPIC_API_KEY or GEMINI_API_KEY)
provider: "anthropic"
model: "gemini-3-flash-preview"           # or "gemini-2.5-flash"
max_tokens: 1024
max_narrative_in_prompt: 15

# Context management thresholds
tool_clear_threshold: 35000
compaction_threshold: 60000

# Haiku triage — skip main model for banter/non-game messages
triage_enabled: true
triage_model: "gemini-3.1-flash-lite-preview"  # or "gemini-2.5-flash"
